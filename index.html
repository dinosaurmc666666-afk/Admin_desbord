<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Manage Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> Admin Login</h2>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="admin">
            </div>
            <div class="form-group">
                <label><i class="fas fa-key"></i> Password</label>
                <input type="password" id="password" placeholder="123456">
            </div>
            <button class="btn btn-primary" onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</button>
            <p class="hint">Default: admin / 123456</p>
            <p class="link"><a href="/products"><i class="fas fa-store"></i> Go to User Dashboard</a></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard" style="display: none;">
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-cogs"></i> Admin Dashboard</h1>
                <div class="header-actions">
                    <a href="/products" class="btn btn-info"><i class="fas fa-store"></i> User View</a>
                    <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-section="products"><i class="fas fa-box"></i> Products</button>
                <button class="nav-btn" data-section="orders"><i class="fas fa-shopping-cart"></i> Orders</button>
                <button class="nav-btn" data-section="users"><i class="fas fa-users"></i> Users</button>
                <button class="nav-btn" data-section="stats"><i class="fas fa-chart-bar"></i> Statistics</button>
            </nav>
        </header>

        <main class="container">
            <!-- Products Section -->
            <section id="productsSection" class="section active">
                <div class="section-header">
                    <h2><i class="fas fa-box-open"></i> Product Management</h2>
                    <button class="btn btn-success" onclick="showAddProductModal()"><i class="fas fa-plus"></i> Add Product</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTable"></tbody>
                    </table>
                </div>
            </section>

            <!-- Orders Section -->
            <section id="ordersSection" class="section">
                <h2><i class="fas fa-shopping-bag"></i> Orders List</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>User</th>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>Total</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTable"></tbody>
                    </table>
                </div>
            </section>

            <!-- Users Section -->
            <section id="usersSection" class="section">
                <h2><i class="fas fa-user-friends"></i> Registered Users</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Registered</th>
                                <th>Orders</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </section>

            <!-- Stats Section -->
            <section id="statsSection" class="section">
                <h2><i class="fas fa-analytics"></i> Statistics</h2>
                <div class="stats-grid" id="statsGrid"></div>
            </section>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fas fa-plus-circle"></i> Add Product</h3>
                <span class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></span>
            </div>
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Product Name</label>
                <input type="text" id="productName">
            </div>
            <div class="form-group">
                <label><i class="fas fa-dollar-sign"></i> Price ($)</label>
                <input type="number" id="productPrice" step="0.01">
            </div>
            <div class="form-group">
                <label><i class="fas fa-warehouse"></i> Stock</label>
                <input type="number" id="productStock">
            </div>
            <div class="form-group">
                <label><i class="fas fa-image"></i> Image URL (optional)</label>
                <input type="text" id="productImage" placeholder="https://...">
            </div>
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Description</label>
                <textarea id="productDescription" rows="4"></textarea>
            </div>
            <button class="btn btn-primary" onclick="saveProduct()"><i class="fas fa-save"></i> Save Product</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
                                </html>

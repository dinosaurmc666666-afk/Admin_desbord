<!DOCTYPE html>
<html lang="km" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - AhnajakCode</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-code"></i> AhnajakAdmin</h2>
        </div>
        <nav class="sidebar-menu">
            <a href="#" class="active" onclick="showSection('dashboard')"><i class="fas fa-home"></i> Dashboard</a>
            <a href="#" onclick="showSection('products')"><i class="fas fa-box"></i> Products</a>
            <a href="#" onclick="showSection('users')"><i class="fas fa-users"></i> Users</a>
            <a href="index.html"><i class="fas fa-external-link-alt"></i> View Website</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h1 id="page-title">Dashboard</h1>
            <div class="admin-profile">
                <span id="admin-name">Admin</span>
                <i class="fas fa-user-circle"></i>
            </div>
        </header>

        <!-- Dashboard Section -->
        <section id="dashboard" class="content-section active">
            <div class="stats-grid">
                <div class="stat-card blue">
                    <i class="fas fa-box"></i>
                    <div class="info">
                        <h3 id="total-products">0</h3>
                        <p>Total Products</p>
                    </div>
                </div>
                <div class="stat-card green">
                    <i class="fas fa-users"></i>
                    <div class="info">
                        <h3 id="total-users">0</h3>
                        <p>Total Users</p>
                    </div>
                </div>
                <div class="stat-card purple">
                    <i class="fas fa-dollar-sign"></i>
                    <div class="info">
                        <h3 id="total-revenue">$0</h3>
                        <p>Est. Revenue</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Products Management Section -->
        <section id="products" class="content-section">
            <div class="section-header">
                <h2>Manage Products</h2>
                <button class="btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i> Add New</button>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Icon</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Vendor</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-table-body">
                        <!-- JS will render here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Users Section -->
        <section id="users" class="content-section">
            <div class="section-header">
                <h2>Registered Users</h2>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Purchases</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Add/Edit Product Modal -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title">Add Product</h3>
                <button onclick="closeProductModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="product-form">
                <input type="hidden" id="p-id">
                <div class="form-group">
                    <label>Product Title</label>
                    <input type="text" id="p-title" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="p-category">
                            <option value="script">Script</option>
                            <option value="plugin">Plugin</option>
                            <option value="template">Template</option>
                            <option value="ui">UI Kit</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" id="p-price" required min="0" step="0.01">
                    </div>
                </div>
                <div class="form-group">
                    <label>Vendor Name</label>
                    <input type="text" id="p-vendor" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="p-desc" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Icon Class (FontAwesome)</label>
                    <input type="text" id="p-icon" placeholder="fa-code" value="fa-code">
                </div>
                <button type="submit" class="btn-primary btn-full">Save Product</button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="admin.js"></script>
</body>
</html>

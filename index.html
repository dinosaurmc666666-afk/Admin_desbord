<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <h2>🔐 Admin Login</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="123456">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
            <p class="hint">Default: admin / 123456</p>
            <p class="link"><a href="../user/index.html">ទៅ User Dashboard →</a></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard" style="display: none;">
        <header class="header">
            <div class="header-content">
                <h1>🛠️ Admin Dashboard</h1>
                <div class="header-actions">
                    <a href="../user/index.html" class="btn btn-info">User View</a>
                    <button class="btn btn-danger" onclick="logout()">Logout</button>
                </div>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-section="products">📦 Products</button>
                <button class="nav-btn" data-section="orders">🛒 Orders</button>
                <button class="nav-btn" data-section="users">👥 Users</button>
                <button class="nav-btn" data-section="stats">📊 Statistics</button>
            </nav>
        </header>

        <main class="container">
            <!-- Products Section -->
            <section id="productsSection" class="section active">
                <div class="section-header">
                    <h2>📦 Product Management</h2>
                    <button class="btn btn-success" onclick="showAddProductModal()">+ Add Product</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTable"></tbody>
                    </table>
                </div>
            </section>

            <!-- Orders Section -->
            <section id="ordersSection" class="section">
                <h2>🛒 Orders List</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>User</th>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>Total</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTable"></tbody>
                    </table>
                </div>
            </section>

            <!-- Users Section -->
            <section id="usersSection" class="section">
                <h2>👥 Registered Users</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Registered</th>
                                <th>Orders</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </section>

            <!-- Stats Section -->
            <section id="statsSection" class="section">
                <h2>📊 Statistics</h2>
                <div class="stats-grid" id="statsGrid"></div>
            </section>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Product</h3>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName">
            </div>
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" id="productPrice" step="0.01">
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" id="productStock">
            </div>
            <div class="form-group">
                <label>Image URL (optional)</label>
                <input type="text" id="productImage" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="productDescription" rows="4"></textarea>
            </div>
            <button class="btn btn-primary" onclick="saveProduct()">Save</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
